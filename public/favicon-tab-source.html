<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 512px;
        height: 512px;
        background: #ffffff;
      }

      body {
        display: grid;
        place-items: center;
        padding: 48px;
      }

      .brand {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif;
        font-weight: 500;
        line-height: 1;
        max-width: 100%;
      }

      .bonjour {
        color: hsl(350, 28%, 42%);
        font-size: 118px;
        white-space: nowrap;
      }

      .jiest {
        color: hsl(220, 32%, 28%);
        font-size: 92px;
        margin-top: -6px;
        margin-left: 0.55em;
        align-self: flex-start;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <span class="brand" aria-label="Bonjour жи есть">
      <span class="bonjour">Bonjour</span>
      <span class="jiest">жи есть</span>
    </span>
  </body>
</html>
