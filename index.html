    <script>
    (function(){
      var isDev = location.hostname === 'localhost' || location.search.includes('debug=1');
      window.__earlyErrors = [];
      try {
        var n = (parseInt(sessionStorage.getItem('bootCount') || '0', 10) + 1);
        sessionStorage.setItem('bootCount', String(n));
        console.log('[boot]', n, Date.now());
      } catch (e) {}
      function show(msgText) {
        var style = 'padding:20px;font:14px system-ui,sans-serif;white-space:pre-wrap;background:#fef2f2;color:#b91c1c;min-height:100vh;min-height:100dvh;box-sizing:border-box';
        var el = document.createElement('pre');
        el.style.cssText = style;
        el.textContent = msgText;
        function insert() {
          if (document.body) {
            document.body.innerHTML = '';
            document.body.appendChild(el);
          }
        }
        if (document.body) insert();
        else document.addEventListener('DOMContentLoaded', insert);
      }
      var shown = false;
      function onError(e) {
        window.__earlyErrors.push({type:'error', message: e.message, filename: e.filename, lineno: e.lineno});
        if (shown) return;
        shown = true;
        if (isDev) show('ERROR: ' + e.message + '\n' + (e.filename || '') + ':' + (e.lineno || ''));
        else show('Ошибка загрузки. Обновите страницу или откройте с ?debug=1 для диагностики.');
      }
      function onRejection(e) {
        window.__earlyErrors.push({type:'rejection', reason: String(e.reason)});
        if (shown) return;
        shown = true;
        if (isDev) show('UNHANDLED REJECTION: ' + String(e.reason));
        else show('Ошибка загрузки. Обновите страницу или откройте с ?debug=1 для диагностики.');
      }
      window.addEventListener('error', onError);
      window.addEventListener('unhandledrejection', onRejection);
      if (!isDev) return;
      var msg = window.__earlyErrors;
      document.addEventListener('DOMContentLoaded', function() {
        if (msg.length > 0) { show('Captured: ' + JSON.stringify(msg, null, 2)); return; }
        setTimeout(function() {
          var root = document.getElementById('root');
          if (root && !root.innerHTML) {
            show('No React mount. Script may have failed to load/parse before execution.');
          }
        }, 3000);
      });
    })();
    </script>
