name: Deploy Landing

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Landing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          VITE_APP_ENV: production
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: landing-dist
          path: dist
          retention-days: 1

  deploy:
    name: Deploy to Production Server
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://desharschool.ru

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: landing-dist
          path: ./dist

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PROD_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Ensure deploy directory exists
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }} \
            "sudo mkdir -p /var/www/deshar-school && sudo chown ${{ secrets.PROD_SERVER_USER }}:${{ secrets.PROD_SERVER_USER }} /var/www/deshar-school"

      - name: Deploy static + API with rsync
        run: |
          rsync -avz --delete --progress \
            -e "ssh -i ~/.ssh/id_rsa" \
            --exclude node_modules \
            --exclude .git \
            --exclude .dev-api-port \
            --exclude dist \
            --exclude .env \
            --filter 'P .env' \
            ./ \
            ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }}:/var/www/deshar-school/
          rsync -avz --delete --progress \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./dist/ \
            ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }}:/var/www/deshar-school/

      - name: Write runtime .env from GitHub Secrets
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }} <<EOF
          cat > /var/www/deshar-school/.env <<EOT
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          MAIL_FROM=${{ secrets.MAIL_FROM }}
          MAIL_TO=${{ secrets.MAIL_TO }}
          EOT
          chmod 600 /var/www/deshar-school/.env
          EOF

      - name: Install deps and restart API
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }} \
            "cd /var/www/deshar-school && npm ci && (pm2 restart deshar-api || pm2 start ecosystem.config.cjs)"

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }} \
            "test -f /var/www/deshar-school/index.html && echo 'Landing deployed successfully'"

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/id_rsa

  notify:
    name: Send Notification
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send success notification
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ Landing deployment successful!"
          echo "Commit: ${{ github.sha }}"
          echo "URL: https://desharschool.ru"

      - name: Send failure notification
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Landing deployment failed!"
          echo "Commit: ${{ github.sha }}"
