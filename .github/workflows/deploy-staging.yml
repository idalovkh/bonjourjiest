name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  build:
    name: Build Landing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          VITE_APP_ENV: staging
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: landing-dist-staging
          path: dist
          retention-days: 1

  deploy:
    name: Deploy to Staging Server
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.bonjourjiest.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Download build artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          name: landing-dist-staging
          path: ./dist

      - name: Setup SSH
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.PROD_SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure deploy directory exists
        run: |
          ssh -i ~/.ssh/id_rsa "${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }}" "bash -lc '
            sudo mkdir -p /var/www/bonjourjiest-staging
            sudo chown -R ${{ secrets.PROD_SERVER_USER }}:${{ secrets.PROD_SERVER_USER }} /var/www/bonjourjiest-staging
          '"

      - name: Deploy static + API with rsync
        run: |
          rsync -avz --delete --progress \
            -e "ssh -i ~/.ssh/id_rsa" \
            --exclude node_modules \
            --exclude .git \
            --exclude .dev-api-port \
            --exclude dist \
            --exclude .env \
            --filter 'P .env' \
            ./ \
            "${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }}:/var/www/bonjourjiest-staging/"
          rsync -avz --progress \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./dist/ \
            "${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }}:/var/www/bonjourjiest-staging/"

      - name: Write runtime .env from GitHub Secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEBUG_LEAD: ${{ secrets.DEBUG_LEAD }}
        run: |
          ssh -i ~/.ssh/id_rsa "${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }}" "bash -lc '
            set -euo pipefail
            umask 077
            printf \"%s\n\" \
              \"TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}\" \
              \"TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}\" \
              \"DEBUG_LEAD=${DEBUG_LEAD}\" \
              > /var/www/bonjourjiest-staging/.env
            chmod 600 /var/www/bonjourjiest-staging/.env
          '"

      - name: Install deps and restart staging API
        run: |
          ssh -i ~/.ssh/id_rsa "${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }}" "bash -lc '
            set -euo pipefail
            cd /var/www/bonjourjiest-staging
            rm -rf node_modules
            npm cache clean --force
            npm ci
            pm2 restart bonjour-api-staging || pm2 start ecosystem.staging.config.cjs
            pm2 save
          '"

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/id_rsa "${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }}" "bash -lc '
            test -f /var/www/bonjourjiest-staging/index.html
            curl -fsS http://127.0.0.1:3003/api/lead/health
            echo \"Staging deployed successfully\"
          '"

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/id_rsa
