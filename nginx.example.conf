# Пример Nginx для deshar-school (статический лендинг + API на VPS)
# Скопируй в /etc/nginx/sites-available/ и сделай symlink в sites-enabled

server {
    listen 80;
    server_name desharschool.ru www.desharschool.ru;

    root /var/www/deshar-school;
    index index.html;

    # Статика
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API — проксируем на Node (serve-api на порту 3001)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Кэш для assets
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
